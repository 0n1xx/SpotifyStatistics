<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Black rounded square — matches iOS app icon -->
  <rect width="120" height="120" rx="26" fill="#0a0a0a"/>

  <!-- Equalizer bars — 5 bars of varying heights, centered -->
  <!-- Bar 1 -->
  <rect x="18" y="54" width="13" height="30" rx="6.5" fill="#1DB954"/>
  <!-- Bar 2 -->
  <rect x="36" y="36" width="13" height="48" rx="6.5" fill="#1DB954"/>
  <!-- Bar 3 -->
  <rect x="54" y="44" width="13" height="40" rx="6.5" fill="#1DB954"/>
  <!-- Bar 4 -->
  <rect x="72" y="28" width="13" height="56" rx="6.5" fill="#1DB954"/>
  <!-- Bar 5 -->
  <rect x="90" y="48" width="13" height="36" rx="6.5" fill="#1DB954" opacity="0.55"/>

  <!-- Subtle arc above bars — Spotify-inspired wave -->
  <path d="M 14 52 Q 60 18 106 52"
        stroke="#1DB954" stroke-width="2.5" fill="none" opacity="0.18"
        stroke-linecap="round"/>
</svg>
